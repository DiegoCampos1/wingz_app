services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wingz}
      POSTGRES_USER: ${POSTGRES_USER:-wingz}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wingz}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wingz} -d ${POSTGRES_DB:-wingz}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  web:
    build:
      context: .
      args:
        # Local/dev image includes test + profiling deps (pytest, ruff, django-silk).
        INSTALL_DEV: "true"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - .:/app

volumes:
  postgres_data:
